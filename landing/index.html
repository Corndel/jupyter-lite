<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corndel Jupyter</title>
  <link rel="icon" href="https://www.corndel.com/app/uploads/2022/10/cropped-favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'DenimInk';
      src: url('./fonts/DenimInk-Normal.woff') format('woff');
      font-display: swap;
    }
    @font-face {
      font-family: 'Lost';
      src: url('./fonts/Lost-Normal.woff') format('woff');
      font-display: swap;
    }

    :root {
      --neutral-50: #fffdfb;
      --neutral-100: #f9f4eb;
      --neutral-200: #e9e4d8;
      --neutral-300: #d6d0c2;
      --neutral-400: #afafaf;
      --neutral-500: #8c8c8c;
      --neutral-600: #696969;
      --neutral-700: #464646;
      --neutral-800: #2b2b2b;
      --neutral-900: #1c1c1c;
      --neutral-950: #111111;
      --coral-500: #f58455;
      --coral-600: #db6130;
      --sky-100: #e0f2fe;
      --sky-600: #0284c7;
      --sky-700: #0369a1;
      --jade-100: #ccfbf1;
      --jade-600: #0d9488;
      --lilac-100: #fae8ff;
      --lilac-600: #c026d3;
      --radius-asymmetric: 6px 30px 30px 30px;
      --radius-asymmetric-small: 4px 20px 20px 20px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Public Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--neutral-50);
      color: var(--neutral-800);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Header ---- */
    .header {
      background: var(--neutral-50);
      border-bottom: 1px solid var(--neutral-200);
      padding: 1.25rem 1.5rem;
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-logo {
      height: 36px;
      width: auto;
    }

    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--neutral-300);
    }

    .header-title {
      font-family: 'DenimInk', sans-serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--neutral-700);
      letter-spacing: -0.01em;
    }

    /* ---- Hero ---- */
    .hero {
      padding: 4rem 1.5rem 3rem;
      text-align: center;
    }

    .hero h1 {
      font-family: 'DenimInk', sans-serif;
      font-size: 2.5rem;
      font-weight: 400;
      color: var(--neutral-900);
      letter-spacing: -0.03em;
      line-height: 1.15;
    }

    .hero p {
      font-family: 'Lost', sans-serif;
      color: var(--neutral-600);
      margin-top: 0.75rem;
      font-size: 1.1rem;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ---- Container ---- */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* ---- Sandbox ---- */
    .sandbox-section {
      margin-bottom: 2.5rem;
    }

    .sandbox-card {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      background: var(--neutral-100);
      border: 1px solid var(--neutral-200);
      border-radius: var(--radius-asymmetric);
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .sandbox-card:hover {
      border-color: var(--coral-500);
      box-shadow: 0 2px 16px rgba(245, 132, 85, 0.12);
    }

    .sandbox-icon {
      width: 48px;
      height: 48px;
      background: var(--coral-500);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sandbox-icon svg {
      width: 24px;
      height: 24px;
      fill: white;
    }

    .sandbox-text h2 {
      font-family: 'DenimInk', sans-serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--neutral-900);
    }

    .sandbox-text p {
      font-size: 0.875rem;
      color: var(--neutral-500);
      margin-top: 0.125rem;
    }

    /* ---- Programme sections ---- */
    .programme-section {
      margin-top: 2.5rem;
    }

    .programme-heading {
      font-family: 'DenimInk', sans-serif;
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--neutral-900);
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--neutral-200);
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }

    .lab-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }

    .lab-card {
      display: block;
      background: white;
      border: 1px solid var(--neutral-200);
      border-radius: var(--radius-asymmetric-small);
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .lab-card:hover {
      border-color: var(--sky-600);
      box-shadow: 0 4px 20px rgba(3, 105, 161, 0.08);
      transform: translateY(-1px);
    }

    .lab-card-number {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--sky-700);
      background: var(--sky-100);
      padding: 0.125rem 0.5rem;
      border-radius: 999px;
      margin-bottom: 0.5rem;
    }

    .lab-card h3 {
      font-family: 'DenimInk', sans-serif;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--neutral-900);
      letter-spacing: -0.01em;
    }

    .lab-card p {
      font-size: 0.85rem;
      color: var(--neutral-500);
      margin-top: 0.25rem;
      line-height: 1.5;
    }

    .programme-empty {
      padding: 1.5rem;
      text-align: center;
      color: var(--neutral-400);
      font-size: 0.875rem;
      border: 1px dashed var(--neutral-200);
      border-radius: var(--radius-asymmetric-small);
    }

    /* ---- Footer ---- */
    .footer {
      border-top: 1px solid var(--neutral-200);
      padding: 1.5rem;
      text-align: center;
      color: var(--neutral-400);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <img src="./logo-light.png" alt="Corndel" class="header-logo">
      <div class="header-divider"></div>
      <span class="header-title">Jupyter</span>
    </div>
  </div>
  <div class="hero">
    <h1>Interactive notebooks</h1>
    <p>Hands-on labs for your apprenticeship programme</p>
  </div>
  <div class="container">
<!-- SANDBOX_SECTION -->
<!-- PROGRAMME_SECTIONS -->
  </div>
  <div class="footer">
    &copy; 2025 Corndel Limited
  </div>
</body>
</html>
